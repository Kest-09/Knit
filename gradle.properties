#Kotlin
kotlin.incremental.usePreciseJavaTracking=true
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.multiplatform=true
kotlin.build.report.output=file
kotlin.daemon.jvmargs=-Xmx2048M

#Gradle
org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.vfs.watch=true
org.gradle.unsafe.isolated-projects=false
org.gradle.jvmargs=-Dorg.gradle.internal.system.info.enabled=false
org.gradle.jvmargs=-Xms2048M -Xmx4096M -Dfile.encoding=UTF-8 -XX:+UseG1GC -XX:MaxGCPauseMillis=200

#Android
android.nonFinalResIds=true
android.nonTransitiveRClass=true
android.useAndroidX=true
android.precompileDependenciesResources=true
android.enableResourceOptimizations=true
android.aapt2.threadPoolSize=4
android.suppressUnsupportedCompileSdk=37.0

#If you are not using Temunx to build your project, or if you are in a different situation, please adjust android.aapt2FromMavenOverride accordingly based on your specific circumstances.

android.aapt2FromMavenOverride=/data/data/com.termux/files/home/android-sdk/build-tools/36.1.0/aapt2