name: Run Tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.parse.outputs.should_test }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: parse
        run: |
          STAGE=$(grep '^version.stage=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "Parsed STAGE: '$STAGE'"
          if [ "$STAGE" = "Alpha" ]; then
            echo "should_test=false" >> $GITHUB_OUTPUT
          else
            echo "should_test=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

  test:
    needs: check-version
    if: ${{ needs.check-version.outputs.should_test == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Run Tests
        run: ./gradlew check -Pandroid.aapt2FromMavenOverride=
      
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          retention-days: 7
