name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.version.outputs.should-publish }}
      version-name: ${{ steps.version.outputs.version-name }}
      is-release: ${{ steps.version.outputs.is-release }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
      
      - name: Read version properties
        id: version
        run: |
          publish=$(grep "version.publish=" version.properties | cut -d'=' -f2)
          stage=$(grep "version.stage=" version.properties | cut -d'=' -f2)
          major=$(grep "version.major=" version.properties | cut -d'=' -f2)
          minor=$(grep "version.minor=" version.properties | cut -d'=' -f2)
          patch=$(grep "version.patch=" version.properties | cut -d'=' -f2)
          
          version_name="${major}.${minor}.${patch}"
          
          if [ "$stage" = "Alpha" ]; then
            version_name="${version_name}-Alpha"
          elif [ "$stage" = "Beta" ]; then
            version_name="${version_name}-Beta"
          fi
          
          should_publish="false"
          is_release="false"
          
          if [ "$publish" = "true" ] && [ "${{ github.event_name }}" = "push" ]; then
            should_publish="true"
            if [ "$stage" = "official" ]; then
              is_release="true"
            fi
          fi
          
          echo "should-publish=${should_publish}" >> $GITHUB_OUTPUT
          echo "version-name=${version_name}" >> $GITHUB_OUTPUT
          echo "is-release=${is_release}" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: github.event_name == 'pull_request' || needs.check-version.outputs.should-publish == 'true'
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact-name: "AndroidApp-release-unsigned.apk"
            artifact-path: "androidApp/build/outputs/apk/release/*.apk"
            archive: false
          - target: ":webApp:wasmJsBrowserDistribution :webApp:jsBrowserDistribution"
            platform: "Web"
            os: ubuntu-latest
            artifact-name: "Web"
            artifact-path: "staging/"
            archive: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            mkdir -p artifacts
            mv androidApp/build/outputs/apk/release/*.apk artifacts/AndroidApp-release-unsigned.apk
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
          fi
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
      
      - name: Download Android artifacts
        uses: actions/download-artifact@v7
        with:
          name: AndroidApp-release-unsigned.apk
          path: ./release-artifacts
      
      - name: Download Web artifacts
        uses: actions/download-artifact@v7
        with:
          name: Web
          path: ./release-artifacts/web
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version-name }}
          name: Release ${{ needs.check-version.outputs.version-name }}
          files: ./release-artifacts/**
          draft: false
          prerelease: false