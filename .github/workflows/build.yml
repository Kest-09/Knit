name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact-name: "Knit.apk"
            artifact-path: "Knit.apk"
            archive: false
          - target: ":webApp:wasmJsBrowserDistribution :webApp:jsBrowserDistribution"
            platform: "Web"
            os: ubuntu-latest
            artifact-name: "Web"
            artifact-path: "staging/"
            archive: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            mkdir -p dist
            mv androidApp/build/outputs/apk/release/*.apk dist/
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
          fi
        shell: bash

      - name: Sign Android APK
        if: matrix.platform == 'Android'
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: dist
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Rename Signed APK
        if: matrix.platform == 'Android'
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} Knit.apk
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          archive: ${{ matrix.archive }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Knit.apk
      - uses: actions/download-artifact@v8
        with:
          name: Web
          path: Web
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ARGS=""
          if [[ "$TAG" == *"-beta"* ]]; then
            ARGS="--prerelease"
          fi
          cd Web && zip -r ../Web.zip . && cd ..
          gh release create "$TAG" Knit.apk Web.zip $ARGS --title "$TAG" --generate-notes
        shell: bash
