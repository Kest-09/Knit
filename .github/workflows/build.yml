name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact_path: "androidApp/build/outputs/apk/release/*.apk"
          - target: "wasmJsBrowserProductionWebpack"
            platform: "Web (WASM)"
            os: ubuntu-latest
            artifact_path: "webApp/build/dist/**"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.artifact_path }}
          retention-days: 7
