name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.parse.outputs.should_build }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: parse
        run: |
          PUBLISH=$(grep '^version.publish=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          STAGE=$(grep '^version.stage=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "Parsed PUBLISH: '$PUBLISH'"
          echo "Parsed STAGE: '$STAGE'"
          if [ "$PUBLISH" = "true" ] && { [ "$STAGE" = "Beta" ] || [ "$STAGE" = "official" ]; }; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          if [ "$STAGE" = "Beta" ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

  build:
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build == 'true' }}
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact-name: "Knit-release-unsigned.apk"
            artifact-path: "Knit-release-unsigned.apk"
            archive: false
          - target: ":webApp:wasmJsBrowserDistribution :webApp:jsBrowserDistribution"
            platform: "Web"
            os: ubuntu-latest
            artifact-name: "Web"
            artifact-path: "staging/"
            archive: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            mv androidApp/build/outputs/apk/release/*.apk Knit-release-unsigned.apk
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
          fi
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          archive: ${{ matrix.archive }}
          retention-days: 7

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Knit-release-unsigned.apk
      - uses: actions/download-artifact@v8
        with:
          name: Web
          path: Web
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAJOR=$(grep '^version.major=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          MINOR=$(grep '^version.minor=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          PATCH=$(grep '^version.patch=' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          TAG="v$MAJOR.$MINOR.$PATCH"
          ARGS=""
          if [ "${{ needs.check-version.outputs.is_prerelease }}" = "true" ]; then
            ARGS="--prerelease"
          fi
          cd Web && zip -r ../Web.zip . && cd ..
          gh release create "$TAG" Knit-release-unsigned.apk Web.zip $ARGS --title "$TAG" --generate-notes
        shell: bash
