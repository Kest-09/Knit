name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact-name: "AndroidApp-release-unsigned.apk"
            artifact-path: "AndroidApp-release-unsigned.apk"
            archive: false
          - target: ":webApp:wasmJsBrowserDistribution :webApp:jsBrowserDistribution"
            platform: "Web"
            os: ubuntu-latest
            artifact-name: "Web"
            artifact-path: "staging/"
            archive: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            mv androidApp/build/outputs/apk/release/*.apk AndroidApp-release-unsigned.apk
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
          fi
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          archive: ${{ matrix.archive }}
          retention-days: 7
