name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
          - target: "wasmJsBrowserDistribution"
            platform: "Web (WASM)"
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          mkdir -p staging
          if [ "${{ matrix.platform }}" = "Android" ]; then
            cp androidApp/build/outputs/apk/release/*.apk staging/
          else
            mkdir -p staging/webApp
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/webApp/
          fi
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-build
          path: staging/
          retention-days: 7
