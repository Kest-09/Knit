name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            artifact-name: "Knit-unsigned.apk"
            artifact-path: "Knit-unsigned.apk"
            archive: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          if [ "${{ matrix.platform }}" = "Android" ]; then
            mv androidApp/build/outputs/apk/release/*.apk Knit-unsigned.apk
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
          fi
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          archive: ${{ matrix.archive }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Knit-unsigned.apk
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ARGS=""
          if [[ "$TAG" == *"-beta"* ]]; then
            ARGS="--prerelease"
          fi
          gh release create "$TAG" Knit-unsigned.apk $ARGS --title "$TAG" --generate-notes
        shell: bash
