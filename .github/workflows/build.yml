name: release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Setup Java Development Kit (JDK 21)
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Initialize Gradle Build Environment
        uses: gradle/actions/setup-gradle@v6
      
      - name: Compile Production Release APK
        run: ./gradlew assembleRelease -Pandroid.aapt2FromMavenOverride=
      
      - name: Sign Android Package (apksigner)
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          ${ANDROID_HOME}/build-tools/36.0.0/apksigner sign --ks keystore.jks --ks-key-alias "${{ secrets.ALIAS }}" --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out Knit-${{ github.ref_name }}-unsigned.apk androidApp/build/outputs/apk/release/*.apk
          rm keystore.jks
        shell: bash
      
      - name: Archive Production Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Knit-${{ github.ref_name }}-unsigned.apk
          path: Knit-${{ github.ref_name }}-unsigned.apk
          archive: false
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Knit-${{ github.ref_name }}-unsigned.apk
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ARGS=""
          if [[ "$TAG" == *"-beta"* ]]; then
            ARGS="--prerelease"
          fi
          gh release create "$TAG" Knit-${{ github.ref_name }}-unsigned.apk $ARGS --title "$TAG" --generate-notes
        shell: bash
