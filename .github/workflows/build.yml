name: Build Android and Web

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "assembleRelease"
            platform: "Android"
            os: ubuntu-latest
            archive: false
          - target: ":webApp:wasmJsBrowserDistribution :webApp:jsBrowserDistribution"
            platform: "Web"
            os: ubuntu-latest
            archive: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Read Version Properties
        run: |
          echo "VERSION_MAJOR=$(grep 'version.major' version.properties | cut -d'=' -f2 | tr -d '\r ')" >> $GITHUB_ENV
          echo "VERSION_MINOR=$(grep 'version.minor' version.properties | cut -d'=' -f2 | tr -d '\r ')" >> $GITHUB_ENV
          echo "VERSION_PATCH=$(grep 'version.patch' version.properties | cut -d'=' -f2 | tr -d '\r ')" >> $GITHUB_ENV
          echo "VERSION_STAGE=$(grep 'version.stage' version.properties | cut -d'=' -f2 | tr -d '\r ')" >> $GITHUB_ENV
          echo "VERSION_PUBLISH=$(grep 'version.publish' version.properties | cut -d'=' -f2 | tr -d '\r ')" >> $GITHUB_ENV
        shell: bash

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      
      - name: Build ${{ matrix.platform }}
        run: ./gradlew ${{ matrix.target }} -Pandroid.aapt2FromMavenOverride=
      
      - name: Organize Artifacts
        run: |
          VERSION_STR="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          if [ "${{ matrix.platform }}" = "Android" ]; then
            if [ "$VERSION_STAGE" = "preview" ]; then
              mv androidApp/build/outputs/apk/release/*.apk "AndroidApp-v${VERSION_STR}-preview-unsigned.apk"
              echo "ART_PATH=AndroidApp-v${VERSION_STR}-preview-unsigned.apk" >> $GITHUB_ENV
              echo "ART_NAME=AndroidApp-v${VERSION_STR}-preview-unsigned.apk" >> $GITHUB_ENV
            else
              mv androidApp/build/outputs/apk/release/*.apk "AndroidApp-v${VERSION_STR}-release-unsigned.apk"
              echo "ART_PATH=AndroidApp-v${VERSION_STR}-release-unsigned.apk" >> $GITHUB_ENV
              echo "ART_NAME=AndroidApp-v${VERSION_STR}-release-unsigned.apk" >> $GITHUB_ENV
            fi
          else
            mkdir -p staging/wasmJs staging/js
            cp -r webApp/build/dist/wasmJs/productionExecutable/* staging/wasmJs/
            cp -r webApp/build/dist/js/productionExecutable/* staging/js/
            echo "ART_PATH=staging/" >> $GITHUB_ENV
            if [ "$VERSION_STAGE" = "preview" ]; then
              echo "ART_NAME=Web-v${VERSION_STR}-preview" >> $GITHUB_ENV
            else
              echo "ART_NAME=Web-v${VERSION_STR}-formal" >> $GITHUB_ENV
            fi
          fi
        shell: bash
      
      - name: Upload ${{ matrix.platform }} artifacts
        if: always() && env.VERSION_PUBLISH == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART_NAME }}
          path: ${{ env.ART_PATH }}
          archive: ${{ matrix.archive }}
          retention-days: 7
